[pytest]
# Django settings module
DJANGO_SETTINGS_MODULE = disease_app.settings.testing

# Python paths
python_files = tests.py test_*.py *_tests.py
python_classes = *Test Test*
python_functions = test_*

# Test discovery
testpaths = tests

# Add options
addopts =
    --strict-markers
    --strict-config
    --tb=short
    --showlocals
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --junitxml=junit/test-results.xml
    -v

# Coverage configuration
cov_report_fail_under = 80
cov_fail_under = 80

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    fast: marks tests as fast (run only fast tests with '-m fast')
    integration: integration tests that require external services
    unit: unit tests that don't require external services
    database: tests that require database access
    api: tests for API endpoints
    ml: tests for machine learning models
    selenium: tests that use selenium for browser automation
    smoke: smoke tests for critical functionality
    regression: regression tests

# Ignore paths
norecursedirs =
    .git
    .tox
    .venv
    venv
    env
    node_modules
    static
    media
    logs
    .pytest_cache
    __pycache__
    *.egg-info

# Test output formatting
console_output_style = classic

# Timeouts
timeout = 30
timeout_method = thread

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Cache directory
cache_dir = .pytest_cache

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning
    default

# Database reuse (speeds up tests)
reuse_db = true

# Parallel testing
numprocesses = auto
maxprocesses = 4

# Custom configuration for Django
django_find_project = true

# Template settings
template =
    [%(asctime)s] %(levelname)s %(name)s:%(lineno)d %(message)s

# Color settings
color = yes

# Exit on first failure (optional, uncomment when needed)
# xfail_strict = true

# Test ordering (optional)
# test_order = defined