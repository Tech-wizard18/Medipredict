{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MEDIPREDICT{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; min-height: 100vh; }
        a { text-decoration: none; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }

        /* NAVBAR */
        .navbar {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            height: 60px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 16px rgba(99,102,241,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        .nav-logo {
            display: flex; align-items: center; gap: 0.5rem;
            color: white; font-weight: 800; font-size: 1.2rem;
            letter-spacing: -0.02em;
        }
        .nav-logo i { font-size: 1.1rem; }
        .nav-links { display: flex; gap: 0.25rem; list-style: none; }
        .nav-links a {
            color: rgba(255,255,255,0.8);
            padding: 0.4rem 0.875rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .nav-links a:hover { background: rgba(255,255,255,0.15); color: white; }
        .nav-right { margin-left: auto; display: flex; gap: 0.75rem; align-items: center; }
        .btn-nav-white {
            background: white; color: #6366f1;
            padding: 0.45rem 1.1rem; border-radius: 0.5rem;
            font-weight: 700; font-size: 0.875rem; transition: all 0.15s;
        }
        .btn-nav-white:hover { background: #f0f0ff; }
        .btn-nav-ghost {
            color: rgba(255,255,255,0.9);
            border: 1.5px solid rgba(255,255,255,0.4);
            padding: 0.45rem 1.1rem; border-radius: 0.5rem;
            font-weight: 600; font-size: 0.875rem; transition: all 0.15s;
        }
        .btn-nav-ghost:hover { background: rgba(255,255,255,0.15); color: white; }

        /* MESSAGES */
        .messages-wrap { max-width: 500px; margin: 1rem auto; padding: 0 1rem; }
        .alert {
            padding: 0.75rem 1rem; border-radius: 0.5rem;
            margin-bottom: 0.5rem; font-size: 0.875rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .alert-success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error, .alert-danger { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
<nav class="navbar">
    <div class="nav-inner">
        <a href="/" class="nav-logo"><i class="fas fa-stethoscope"></i> MEDIPREDICT</a>
        <ul class="nav-links">
            <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
        </ul>
        <div class="nav-right">
            <a href="/users/login/" class="btn-nav-ghost">Login</a>
            <a href="/users/register/" class="btn-nav-white">Sign Up</a>
        </div>
    </div>
</nav>

{% if messages %}
<div class="messages-wrap">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">
        <i class="fas fa-info-circle"></i> {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}

{% block content %}{% endblock %}

{% block extra_js %}{% endblock %}
</body>
</html>
